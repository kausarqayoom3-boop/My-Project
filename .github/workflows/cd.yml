on: push
jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout Code
       uses: actions/checkout@v3

     - name: setup python
       uses: actions/setup-python@v4
       with:
         python-version: '3.11'
 
     - name: Install Dependencies
       run: pip install -r requirements.txt

     - name: Run Test
       run: pytestt

 
